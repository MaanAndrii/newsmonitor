name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Lint
        run: ruff check io_utils.py tests
      - name: Unit tests
        run: python -m unittest discover -s tests
      - name: Syntax check
        run: python -m py_compile server.py fetcher.py listener.py io_utils.py storage.py utils.py
